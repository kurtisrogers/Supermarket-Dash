name: Update Prices

on:
  schedule:
    # Daily at 06:00 UTC — spiders + API fetchers update each supermarket catalog
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      store:
        description: 'Single store to update (blank = all stores)'
        required: false
        type: choice
        options:
          - ''
          - tesco
          - sainsburys
          - asda
          - morrisons
          - aldi
          - lidl
          - waitrose
          - ocado

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium for Ocado/Asda spiders
        run: npx playwright install --with-deps chromium

      - name: Fetch live catalogs into per-store seed files
        run: npm run update-prices
        env:
          PEPESTO_API_KEY: ${{ secrets.PEPESTO_API_KEY }}
          TESCO_API_KEY: ${{ secrets.TESCO_API_KEY }}
          UPDATE_STORE: ${{ github.event.inputs.store }}

      - name: Build site
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json src/data/products.seed.json src/data/catalogs/ docs/
          if git diff --staged --quiet; then
            echo "No catalog changes to commit"
          else
            git commit -m "chore: daily catalog update $(date -u +%Y-%m-%d)"
            git push
          fi

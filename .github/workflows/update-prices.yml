name: Update Prices

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update product prices
        run: node scripts/update-prices.js
        env:
          PEPESTO_API_KEY: ${{ secrets.PEPESTO_API_KEY }}

      - name: Build site
        run: node scripts/build.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json docs/
          if git diff --staged --quiet; then
            echo "No price changes to commit"
          else
            git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
            git push
          fi
